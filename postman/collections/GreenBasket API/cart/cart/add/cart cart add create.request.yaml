$kind: http-request
name: cart cart add create
description: |-
  Добавляет товар в корзину.
  Если товар уже в корзине, обновляет количество
url: "{{baseUrl}}/cart/cart/add/"
method: POST
body:
  type: json
  content: "{\r

    \  \"product\": 5,\r

    \  \"quantity\": 2\r

    }"
auth:
  type: bearer
  credentials:
    token: "{{accessToken}}"
examples: ./.resources/cart cart add create.resources/examples
order: 1000
