$kind: http-request
name: catalog categories list
description: |-
  Просмотр категорий с подкатегориями.
  list: Возвращает список категорий с вложенными подкатегориями. Доступны:
   пагинация,
   поиск названию (вхождение подстроки),
   сортировка по полю "name"
  retrieve: Возвращает категорию с подкатегориями по id категории
url: "{{baseUrl}}/catalog/categories/?ordering=&page=1&page_size=10&search="
method: GET
headers:
  Accept: application/json
queryParams:
  - key: ordering
    value: ""
    description: Which field to use when ordering the results.
  - key: page
    value: "1"
    description: A page number within the paginated result set.
  - key: page_size
    value: "10"
    description: Number of results to return per page.
  - key: search
    value: ""
    description: A search term.
body:
  type: text
  content: ""
auth:
  type: bearer
  credentials:
    token: "{{accessToken}}"
examples: ./.resources/catalog categories list.resources/examples
order: 1000
