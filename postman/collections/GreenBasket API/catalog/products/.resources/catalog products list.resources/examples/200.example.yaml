$kind: http-example
request:
  url: "{{baseUrl}}/catalog/products/?category=string&ordering=string&page=8899&p\
    age_size=8899&search=string&subcategory=string"
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  queryParams:
    - key: category
      value: string
    - key: ordering
      value: string
      description: Which field to use when ordering the results.
    - key: page
      value: "8899"
      description: A page number within the paginated result set.
    - key: page_size
      value: "8899"
      description: Number of results to return per page.
    - key: search
      value: string
      description: A search term.
    - key: subcategory
      value: string
  body:
    type: text
    content: ""
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "count": 123,
        "results": [
          {
            "category": {
              "id": 1021,
              "name": "string",
              "slug": "uLpRP08"
            },
            "id": 6400,
            "image": "string",
            "name": "string",
            "price": ".2",
