$kind: http-request
name: catalog products list
description: |-
  Просмотр товаров.
  list: Возвращает список товаров с категорией и подкатегорией (с пагинацией). Доступны:
   пагинация,
   поиск названию (вхождение подстроки),
   сортировка по полям ("name", "subcategory__name", "subcategory__category__name"),
   фильтрация по категориям через slug ("frukty", "ovoshchi", "molochnye-produkty" и др.),
   фильтрация по подкатегориям через slug ("tsitrusovye", "iagody", "korneplody", "listovye", "plodovye" и др.),
  retrieve: Возвращает детальную информацию о товаре по id товара
url: "{{baseUrl}}/catalog/products/?category=&ordering=&page=1&page_size=10&search=&subcategory="
method: GET
headers:
  Accept: application/json
queryParams:
  - key: category
    value: ""
  - key: ordering
    value: ""
    description: Which field to use when ordering the results.
  - key: page
    value: "1"
    description: A page number within the paginated result set.
  - key: page_size
    value: "10"
    description: Number of results to return per page.
  - key: search
    value: ""
    description: A search term.
  - key: subcategory
    value: ""
body:
  type: text
  content: ""
auth:
  type: bearer
  credentials:
    token: "{{accessToken}}"
examples: ./.resources/catalog products list.resources/examples
order: 1000
