$kind: collection
name: GreenBasket API
description: Документация API
scripts:
  - type: http:beforeRequest
    code: "let baseUrl = pm.environment.get(\"baseUrl\");\r

      \r

      pm.sendRequest({\r

      \    url: baseUrl + '/users/login/',\r

      \    method: 'POST',\r

      \    header: {\r

      \        'Content-Type': 'application/json'\r

      \    },\r

      \    body: {\r

      \        mode: 'raw',\r

      \        raw: JSON.stringify({\r

      \            email: pm.environment.get(\"email\"),\r

      \            password: pm.environment.get(\"password\")\r

      \        })\r

      \    }\r

      }, function (err, res) {\r

      \    if (err) {\r

      \        console.log(err);\r

      \        return;\r

      \    }\r

      \r

      \    let jsonData = res.json();\r

      \r

      \    pm.environment.set(\"accessToken\", jsonData.access);\r

      \    pm.environment.set(\"refreshToken\", jsonData.refresh);\r

      });"
auth:
  type: bearer
  credentials:
    token: "{{accessToken}}"
