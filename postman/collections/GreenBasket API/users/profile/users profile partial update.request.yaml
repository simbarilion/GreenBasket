$kind: http-request
name: users profile partial update
description: |-
  API endpoint профиля пользователя.
  Позволяет:
  - получить текущего пользователя
  - обновить данные профиля
url: "{{baseUrl}}/users/profile/"
method: PATCH
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: |-
    {

      "phone_number": "+79236668877"

    }
auth:
  type: bearer
  credentials:
    token: "{{accessToken}}"
examples: ./.resources/users profile partial update.resources/examples
order: 3000
