$kind: http-example
request:
  url: "{{baseUrl}}/users/profile/"
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  body:
    type: text
    content: ""
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "email": "B6a7SJ0Hm4QkGS@GMjXWkZTwk.fh",
        "is_verified": true,
        "username": "VZRX@agGC",
        "phone_number": "string",
        "city": 6056
      }
order: 1000
