$kind: http-request
description: Logout endpoint. Не выполняет серверных действий. Используется
  клиентом для удаления токена
url: "{{baseUrl}}/users/logout/"
method: POST
body:
  type: text
  content: ""
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/users logout create.resources/examples
order: 1000
