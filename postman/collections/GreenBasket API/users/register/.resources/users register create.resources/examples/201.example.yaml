$kind: http-example
request:
  url: "{{baseUrl}}/users/register/"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  body:
    type: json
    content: |-
      {
        "email": "67ctGwuFzaasQg@kRk.xd",
        "password": "string",
        "password2": "string",
        "username": "string",
        "phone_number": "string",
        "city": 8403
      }
response:
  statusCode: 201
  statusText: Created
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "email": "uZzRstRDNHchh@hrGzeSYRnsa.kdfd",
        "username": "string",
        "phone_number": "string",
        "city": 4394
      }
order: 1000
