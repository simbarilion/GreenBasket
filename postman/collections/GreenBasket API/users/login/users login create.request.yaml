$kind: http-request
name: users login create
description: JWT авторизация пользователя. Возвращает access и refresh токены
url: "{{baseUrl}}/users/login/"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: |-
    {
      "email": "admin@example.com",
      "password": "admin123"
    }
scripts:
  - type: afterResponse
    code: "pm.test(\"Save tokens\", function () {\r

      \    var jsonData = pm.response.json();\r

      \r

      \    pm.environment.set(\"accessToken\", jsonData.access);\r

      \    pm.environment.set(\"refreshToken\", jsonData.refresh);\r

      });"
    language: text/javascript
examples: ./.resources/users login create.resources/examples
order: 1000
