$kind: http-example
request:
  url: "{{baseUrl}}/users/login/"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/json
  body:
    type: json
    content: |-
      {
        "email": "string",
        "password": "string"
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "email": 1086,
        "password": "string"
      }
order: 1000
