$kind: http-request
name: schema retrieve
description: |-
  OpenApi3 schema for this API. Format can be selected via content negotiation.

  - YAML: application/vnd.oai.openapi
  - JSON: application/vnd.oai.openapi+json
url: "{{baseUrl}}/schema/?format=yaml&lang=sq"
method: GET
headers:
  Accept: application/vnd.oai.openapi
queryParams:
  format: yaml
  lang: sq
body:
  type: text
  content: ""
auth:
  type: bearer
  credentials:
    token: "{{accessToken}}"
examples: ./.resources/schema retrieve.resources/examples
order: 1000
