$kind: http-request
description: Обновляет количество товара в корзине
url: "{{baseUrl}}/cart/update_item/"
method: PATCH
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "product": 125,
      "quantity": 1870584097
    }
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/cart update item partial update.resources/examples
order: 1000
