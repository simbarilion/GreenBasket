$kind: http-example
request:
  url: "{{baseUrl}}/cart/update_item/"
  method: PATCH
  headers:
    - key: Content-Type
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  body:
    type: json
    content: |-
      {
        "product": 125,
        "quantity": 1870584097
      }
response:
  statusCode: 200
  statusText: OK
  body:
    type: text
    content: ""
order: 1000
