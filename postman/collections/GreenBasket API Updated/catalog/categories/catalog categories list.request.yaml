$kind: http-request
description: |-
  Просмотр категорий с подкатегориями.
  list: Возвращает список категорий с вложенными подкатегориями. Доступны:
   пагинация,
   поиск названию (вхождение подстроки),
   сортировка по полю "name"
  retrieve: Возвращает категорию с подкатегориями по id категории
url: "{{baseUrl}}/catalog/categories/?ordering=string&page=4175&page_size=4175&search=string"
method: GET
headers:
  Accept: application/json
queryParams:
  - key: ordering
    value: string
    description: Which field to use when ordering the results.
  - key: page
    value: "4175"
    description: A page number within the paginated result set.
  - key: page_size
    value: "4175"
    description: Number of results to return per page.
  - key: search
    value: string
    description: A search term.
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/catalog categories list.resources/examples
order: 2000
