$kind: http-example
request:
  url: "{{baseUrl}}/catalog/products/?category=string&ordering=string&page=4175&page_size=4175&search=string&subcategory=string"
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  queryParams:
    - key: category
      value: string
    - key: ordering
      value: string
      description: Which field to use when ordering the results.
    - key: page
      value: "4175"
      description: A page number within the paginated result set.
    - key: page_size
      value: "4175"
      description: Number of results to return per page.
    - key: search
      value: string
      description: A search term.
    - key: subcategory
      value: string
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
