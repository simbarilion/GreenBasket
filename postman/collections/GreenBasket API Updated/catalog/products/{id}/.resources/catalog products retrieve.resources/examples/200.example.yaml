$kind: http-example
request:
  url: "{{baseUrl}}/catalog/products/:id/"
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  pathVariables:
    - key: id
      value: "4175"
      description: A unique integer value identifying this Товар.
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "category": {
          "id": 9950,
          "name": "string",
          "slug": "cPsfUP9"
        },
        "id": 1766,
        "image": "string",
        "name": "string",
        "price": "-9594618.",
        "subcategory": "string",
        "slug": "RoHraWDwi1o"
      }
order: 1000
