$kind: http-example
request:
  url: "{{baseUrl}}/users/password_reset_confirm/"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  body:
    type: json
    content: |-
      {
        "new_password": "string",
        "token": "string",
        "uid": "string"
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "token": "string",
        "uid": "string",
        "new_password": 2355
      }
order: 1000
