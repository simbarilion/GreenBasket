$kind: http-request
description: Подтверждение сброса пароля, сохранение нового пароля
url: "{{baseUrl}}/users/password_reset_confirm/"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: |-
    {
      "new_password": "string",
      "token": "string",
      "uid": "string"
    }
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/users password reset confirm create.resources/examples
order: 1000
