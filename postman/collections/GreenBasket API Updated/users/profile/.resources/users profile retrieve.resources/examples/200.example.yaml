$kind: http-example
request:
  url: "{{baseUrl}}/users/profile/"
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "email": "WEtQYDERfbKHN@gefIUzCfBmo.fzw",
        "is_verified": true,
        "username": "92zTw637Dc",
        "phone_number": "string",
        "city": 3338
      }
order: 1000
