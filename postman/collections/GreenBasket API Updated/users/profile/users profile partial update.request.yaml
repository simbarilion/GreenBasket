$kind: http-request
description: |-
  API endpoint профиля пользователя.
  Позволяет:
  - получить текущего пользователя
  - обновить данные профиля
url: "{{baseUrl}}/users/profile/"
method: PATCH
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: |-
    {
      "username": "-nt0Y4iEBj",
      "phone_number": "string",
      "city": 3917
    }
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/users profile partial update.resources/examples
order: 3000
