$kind: http-request
description: |-
  API endpoint профиля пользователя.
  Позволяет:
  - получить текущего пользователя
  - обновить данные профиля
url: "{{baseUrl}}/users/profile/"
method: GET
headers:
  Accept: application/json
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/users profile retrieve.resources/examples
order: 1000
