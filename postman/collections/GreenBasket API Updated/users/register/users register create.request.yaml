$kind: http-request
description: |-
  API endpoint для регистрации пользователя.
  Создает неактивного пользователя и отправляет письмо со ссылкой для подтверждения email
url: "{{baseUrl}}/users/register/"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: |-
    {
      "email": "1S0@YydeXDSJS.ulza",
      "password": "string",
      "password2": "string",
      "username": "string",
      "phone_number": "string",
      "city": 9393
    }
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/users register create.resources/examples
order: 1000
