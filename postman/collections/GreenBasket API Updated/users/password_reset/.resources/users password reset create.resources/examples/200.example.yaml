$kind: http-example
request:
  url: "{{baseUrl}}/users/password_reset/"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  body:
    type: json
    content: |-
      {
        "email": "YXVB@LsPQeWczpqSYoddvDVjTusAwSiuu.ubx"
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "email": "YXVB@LsPQeWczpqSYoddvDVjTusAwSiuu.ubx"
      }
order: 1000
