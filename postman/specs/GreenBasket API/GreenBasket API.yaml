openapi: 3.0.3
info:
  title: GreenBasket API
  version: 1.0.0
  description: Документация API
paths:
  /cart/cart/:
    get:
      operationId: cart_cart_retrieve
      description: Возвращает список товаров в корзине
      tags:
      - cart
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          description: No response body
  /cart/cart/add/:
    post:
      operationId: cart_cart_add_create
      description: |-
        Добавляет товар в корзину.
        Если товар уже в корзине, обновляет количество
      tags:
      - cart
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          description: No response body
  /cart/cart/clear/:
    delete:
      operationId: cart_cart_clear_destroy
      description: Очищает корзину
      tags:
      - cart
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '204':
          description: No response body
  /cart/cart/remove/:
    delete:
      operationId: cart_cart_remove_destroy
      description: Удаляет товар из корзины
      tags:
      - cart
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '204':
          description: No response body
  /cart/cart/update_item/:
    patch:
      operationId: cart_cart_update_item_partial_update
      description: Обновляет количество товара в корзине
      tags:
      - cart
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          description: No response body
  /catalog/categories/:
    get:
      operationId: catalog_categories_list
      description: |-
        Просмотр категорий с подкатегориями.
        list: Возвращает список категорий с вложенными подкатегориями. Доступны:
         пагинация,
         поиск названию (вхождение подстроки),
         сортировка по полю "name"
        retrieve: Возвращает категорию с подкатегориями по id категории
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - catalog
      security:
      - jwtAuth: []
      - BearerAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCategoryList'
          description: ''
  /catalog/categories/{id}/:
    get:
      operationId: catalog_categories_retrieve
      description: |-
        Просмотр категорий с подкатегориями.
        list: Возвращает список категорий с вложенными подкатегориями. Доступны:
         пагинация,
         поиск названию (вхождение подстроки),
         сортировка по полю "name"
        retrieve: Возвращает категорию с подкатегориями по id категории
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Категория.
        required: true
      tags:
      - catalog
      security:
      - jwtAuth: []
      - BearerAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
          description: ''
  /catalog/products/:
    get:
      operationId: catalog_products_list
      description: |-
        Просмотр товаров.
        list: Возвращает список товаров с категорией и подкатегорией (с пагинацией). Доступны:
         пагинация,
         поиск названию (вхождение подстроки),
         сортировка по полям ("name", "subcategory__name", "subcategory__category__name"),
         фильтрация по категориям через slug ("frukty", "ovoshchi", "molochnye-produkty" и др.),
         фильтрация по подкатегориям через slug ("tsitrusovye", "iagody", "korneplody", "listovye", "plodovye" и др.),
        retrieve: Возвращает детальную информацию о товаре по id товара
      parameters:
      - in: query
        name: category
        schema:
          type: string
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: subcategory
        schema:
          type: string
      tags:
      - catalog
      security:
      - jwtAuth: []
      - BearerAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedProductList'
          description: ''
  /catalog/products/{id}/:
    get:
      operationId: catalog_products_retrieve
      description: |-
        Просмотр товаров.
        list: Возвращает список товаров с категорией и подкатегорией (с пагинацией). Доступны:
         пагинация,
         поиск названию (вхождение подстроки),
         сортировка по полям ("name", "subcategory__name", "subcategory__category__name"),
         фильтрация по категориям через slug ("frukty", "ovoshchi", "molochnye-produkty" и др.),
         фильтрация по подкатегориям через slug ("tsitrusovye", "iagody", "korneplody", "listovye", "plodovye" и др.),
        retrieve: Возвращает детальную информацию о товаре по id товара
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Товар.
        required: true
      tags:
      - catalog
      security:
      - jwtAuth: []
      - BearerAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
          description: ''
  /schema/:
    get:
      operationId: schema_retrieve
      description: |-
        OpenApi3 schema for this API. Format can be selected via content negotiation.

        - YAML: application/vnd.oai.openapi
        - JSON: application/vnd.oai.openapi+json
      parameters:
      - in: query
        name: format
        schema:
          type: string
          enum:
          - json
          - yaml
      - in: query
        name: lang
        schema:
          type: string
          enum:
          - af
          - ar
          - ar-dz
          - ast
          - az
          - be
          - bg
          - bn
          - br
          - bs
          - ca
          - ckb
          - cs
          - cy
          - da
          - de
          - dsb
          - el
          - en
          - en-au
          - en-gb
          - eo
          - es
          - es-ar
          - es-co
          - es-mx
          - es-ni
          - es-ve
          - et
          - eu
          - fa
          - fi
          - fr
          - fy
          - ga
          - gd
          - gl
          - he
          - hi
          - hr
          - hsb
          - ht
          - hu
          - hy
          - ia
          - id
          - ig
          - io
          - is
          - it
          - ja
          - ka
          - kab
          - kk
          - km
          - kn
          - ko
          - ky
          - lb
          - lt
          - lv
          - mk
          - ml
          - mn
          - mr
          - ms
          - my
          - nb
          - ne
          - nl
          - nn
          - os
          - pa
          - pl
          - pt
          - pt-br
          - ro
          - ru
          - sk
          - sl
          - sq
          - sr
          - sr-latn
          - sv
          - sw
          - ta
          - te
          - tg
          - th
          - tk
          - tr
          - tt
          - udm
          - ug
          - uk
          - ur
          - uz
          - vi
          - zh-hans
          - zh-hant
      tags:
      - schema
      security:
      - jwtAuth: []
      - BearerAuth: []
      - {}
      responses:
        '200':
          content:
            application/vnd.oai.openapi:
              schema:
                type: object
                additionalProperties: {}
            application/yaml:
              schema:
                type: object
                additionalProperties: {}
            application/vnd.oai.openapi+json:
              schema:
                type: object
                additionalProperties: {}
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /users/activate/:
    get:
      operationId: users_activate_retrieve
      description: Проверяет ссылку для активации аккаунта пользователя, активирует
        аккаунт
      tags:
      - users
      security:
      - jwtAuth: []
      - BearerAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /users/login/:
    post:
      operationId: users_login_create
      description: JWT авторизация пользователя. Возвращает access и refresh токены
      tags:
      - users
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomToken'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CustomToken'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CustomToken'
        required: true
      security:
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomToken'
          description: ''
  /users/logout/:
    post:
      operationId: users_logout_create
      description: Logout endpoint. Не выполняет серверных действий. Используется
        клиентом для удаления токена
      tags:
      - users
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          description: No response body
  /users/password_reset/:
    post:
      operationId: users_password_reset_create
      description: Сброс пароля, отправка письма для подтверждения
      tags:
      - users
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PasswordResetRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PasswordResetRequest'
        required: true
      security:
      - jwtAuth: []
      - BearerAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordResetRequest'
          description: ''
  /users/password_reset_confirm/:
    post:
      operationId: users_password_reset_confirm_create
      description: Подтверждение сброса пароля, сохранение нового пароля
      tags:
      - users
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirm'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirm'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirm'
        required: true
      security:
      - jwtAuth: []
      - BearerAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordResetConfirm'
          description: ''
  /users/profile/:
    get:
      operationId: users_profile_retrieve
      description: |-
        API endpoint профиля пользователя.
        Позволяет:
        - получить текущего пользователя
        - обновить данные профиля
      tags:
      - users
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
          description: ''
    put:
      operationId: users_profile_update
      description: |-
        API endpoint профиля пользователя.
        Позволяет:
        - получить текущего пользователя
        - обновить данные профиля
      tags:
      - users
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserProfile'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserProfile'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserProfile'
        required: true
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
          description: ''
    patch:
      operationId: users_profile_partial_update
      description: |-
        API endpoint профиля пользователя.
        Позволяет:
        - получить текущего пользователя
        - обновить данные профиля
      tags:
      - users
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUserProfile'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUserProfile'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUserProfile'
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
          description: ''
  /users/refresh/:
    post:
      operationId: users_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - users
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
        required: true
      security:
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /users/register/:
    post:
      operationId: users_register_create
      description: |-
        API endpoint для регистрации пользователя.
        Создает неактивного пользователя и отправляет письмо со ссылкой для подтверждения email
      tags:
      - users
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Register'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Register'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Register'
        required: true
      security:
      - jwtAuth: []
      - BearerAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Register'
          description: ''
components:
  schemas:
    Category:
      type: object
      description: Сериализатор категории с подкатегориями
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
        slug:
          type: string
          maxLength: 50
          pattern: ^[-a-zA-Z0-9_]+$
        image:
          type: string
          format: uri
        subcategories:
          type: array
          items:
            $ref: '#/components/schemas/SubCategory'
          readOnly: true
      required:
      - id
      - image
      - name
      - subcategories
    CategoryMini:
      type: object
      description: 'Упрощенный сериализатор категории: для отображения краткой информации'
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
        slug:
          type: string
          maxLength: 50
          pattern: ^[-a-zA-Z0-9_]+$
      required:
      - id
      - name
    CustomToken:
      type: object
      description: JWT-сериализатор для аутентификации по email вместо username
      properties:
        email:
          type: string
          writeOnly: true
        password:
          type: string
          writeOnly: true
      required:
      - email
      - password
    PaginatedCategoryList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/Category'
    PaginatedProductList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/Product'
    PasswordResetConfirm:
      type: object
      description: |-
        Сериализатор подтверждения сброса пароля:
        Ожидает:
        - uid пользователя
        - токен
        - новый пароль
      properties:
        uid:
          type: string
        token:
          type: string
        new_password:
          type: string
          writeOnly: true
      required:
      - new_password
      - token
      - uid
    PasswordResetRequest:
      type: object
      description: Сериализатор для сброса пароля
      properties:
        email:
          type: string
          format: email
      required:
      - email
    PatchedUserProfile:
      type: object
      description: Сериализатор профиля пользователя
      properties:
        email:
          type: string
          format: email
          readOnly: true
        username:
          type: string
          title: Имя пользователя
          description: Обязательное поле. Не более 150 символов. Только буквы, цифры
            и символы @/./+/-/_.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        phone_number:
          type: string
          nullable: true
          title: Номер телефона
          description: Необязательное поле
          maxLength: 128
        city:
          type: integer
          nullable: true
          title: Город
        is_verified:
          type: boolean
          readOnly: true
          title: Email подтвержден
    Product:
      type: object
      description: Сериализатор товара
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
        slug:
          type: string
          maxLength: 50
          pattern: ^[-a-zA-Z0-9_]+$
        category:
          allOf:
          - $ref: '#/components/schemas/CategoryMini'
          readOnly: true
        subcategory:
          type: string
          readOnly: true
        price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        image:
          type: string
          readOnly: true
      required:
      - category
      - id
      - image
      - name
      - price
      - subcategory
    Register:
      type: object
      description: |-
        Сериализатор регистрации пользователя:
        - проверка совпадения паролей
        - валидация пароля через Django validators
        - создание неактивного пользователя
      properties:
        email:
          type: string
          format: email
        username:
          type: string
        password:
          type: string
          writeOnly: true
        password2:
          type: string
          writeOnly: true
        phone_number:
          type: string
          nullable: true
          title: Номер телефона
          description: Необязательное поле
          maxLength: 128
        city:
          type: integer
          nullable: true
          title: Город
      required:
      - email
      - password
      - password2
      - username
    SubCategory:
      type: object
      description: Сериализатор подкатегории
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
        category:
          type: string
          readOnly: true
        slug:
          type: string
          maxLength: 50
          pattern: ^[-a-zA-Z0-9_]+$
        image:
          type: string
          format: uri
      required:
      - category
      - id
      - image
      - name
    TokenRefresh:
      type: object
      properties:
        access:
          type: string
          readOnly: true
        refresh:
          type: string
      required:
      - access
      - refresh
    UserProfile:
      type: object
      description: Сериализатор профиля пользователя
      properties:
        email:
          type: string
          format: email
          readOnly: true
        username:
          type: string
          title: Имя пользователя
          description: Обязательное поле. Не более 150 символов. Только буквы, цифры
            и символы @/./+/-/_.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        phone_number:
          type: string
          nullable: true
          title: Номер телефона
          description: Необязательное поле
          maxLength: 128
        city:
          type: integer
          nullable: true
          title: Город
        is_verified:
          type: boolean
          readOnly: true
          title: Email подтвержден
      required:
      - email
      - is_verified
      - username
  securitySchemes:
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
